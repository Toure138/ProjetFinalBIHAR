services:

  # ── API FastAPI ───────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./model:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Interface web météo ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Airflow — PostgreSQL (base de métadonnées) ───────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  # ── Airflow — initialisation unique (db migrate + création admin) ─────────────
  airflow-init:
    image: apache/airflow:2.9.1
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet -r /opt/airflow/dags/requirements-airflow.txt &&
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname Admin \
          --role Admin --email admin@example.com || true
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__WEBSERVER__SECRET_KEY: bihar2026secret
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_TEMPERATURE_API: http://api:8000
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http==4.10.1"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Airflow — scheduler (exécute les DAGs) ────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.1
    command: scheduler
    environment:
      <<: *airflow_env
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http==4.10.1"
    volumes:
      - ./dags:/opt/airflow/dags
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow — webserver (UI sur port 8081) ────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.1
    command: webserver
    ports:
      - "8081:8080"
    environment:
      <<: *airflow_env
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-http==4.10.1"
    volumes:
      - ./dags:/opt/airflow/dags
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./src/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
