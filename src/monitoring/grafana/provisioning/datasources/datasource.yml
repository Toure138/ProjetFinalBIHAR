apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  # Plugin Infinity : interroge directement l'API FastAPI pour les graphiques
  # prédictions vs réel (endpoint /monitoring/data)
  - name: Infinity
    uid: infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: true
    jsonData:
      tlsSkipVerify: true
      allowedHosts:
        - "http://api:8000"
